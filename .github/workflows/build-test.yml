name: Build & Test

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r ci_sandbox/requirements.txt
      - name: Run tests
        run: pytest ci_sandbox/tests

  # placeholder for future SonarQube quality gate (see 인수인계 문서 4-4)
  code-scanning:
    needs: build-test
    runs-on: ubuntu-latest
